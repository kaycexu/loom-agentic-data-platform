# Jaeger all-in-one вАФвАФ жО•жФґ Loom зЪД OTLP trace еєґеПѓиІЖеМЦгАВ
#   docker compose -f deploy/docker-compose.yaml up -d
#   зДґеРОпЉЪLOOM_OTEL=otlp loom demo   пЉИжИЦдїїжДПеСљдї§еК† --otel otlpпЉЙ
#   жЙУеЉА http://localhost:16686 пЉМservice=loomпЉМзЬЛ scheduleвЖТrolloutвЖТstep/verifyвЖТcheck зЪД trace ж†СгАВ
services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: loom-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTPпЉИLoom йїШиЃ§еѓЉеЗЇзЂѓзВєпЉЙ
      - "4317:4317"     # OTLP gRPC
