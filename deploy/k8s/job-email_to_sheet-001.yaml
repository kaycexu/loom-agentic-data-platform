apiVersion: batch/v1
kind: Job
metadata:
  name: loom-rollout-email-to-sheet-001
  labels:
    app: loom
    loom/resource-class: light
    loom/run-id: "k8s"
spec:
  backoffLimit: 2          # 与 max_attempts 对应：失败重试，耗尽进 dead-letter
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: rollout
          image: loom:latest
          args: ["run-job", "--task-id", "email_to_sheet-001", "--policy", "mock:correct"]
          env:
            - name: LOOM_OTEL
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector:4318"   # trace 汇聚到 Jaeger
          resources:
            requests: {cpu: "250m", memory: "256Mi"}
            limits: {cpu: "250m", memory: "256Mi"}
